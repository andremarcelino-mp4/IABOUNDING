<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OunceAI | Visão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased">
    <main class="min-h-screen p-8 lg:px-20 lg:py-12">
        <div class="max-w-5xl mx-auto space-y-8">
            <header class="flex flex-col gap-4 pb-6 border-b border-zinc-800">
                <div class="flex items-center justify-between gap-4">
                    <div>
                        <p class="text-emerald-500 uppercase text-sm tracking-widest">Visão Computacional</p>
                        <h1 class="text-4xl font-bold">Monitor YOLO</h1>
                    </div>
                    <a href="/inventory/dashboard" class="inline-flex items-center gap-2 rounded-xl border border-zinc-700 px-4 py-3 text-sm hover:bg-zinc-800 transition">
                        <i data-lucide="arrow-left"></i> Voltar ao Dashboard
                    </a>
                </div>
                <p class="text-zinc-400">Veja o feed ao vivo com análise de objetos em tempo real.</p>
            </header>

            <section class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 shadow-lg shadow-black/20">
                <div class="mb-6 rounded-3xl border border-zinc-800 bg-zinc-950 p-4 text-center text-zinc-400">
                    Se o vídeo não carregar, verifique se a câmera está acessível e se o backend está executando corretamente.
                </div>
                <div class="overflow-hidden rounded-3xl border border-zinc-800 bg-black">
                    <img src="/vision/stream" alt="Stream de Visão" class="w-full object-cover" />
                </div>
            </section>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
